<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Strichliste">
<meta name="theme-color" content="#0A0E17">
<title>Tages-Strichliste</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#0A0E17;
    --bg-glow:#111a30;
    --card:#141B2D;
    --card-border:#232C42;
    --card-border-hover:#334063;
    --text:#ECEFF5;
    --text-soft:#8891A6;
    --text-faint:#5A6378;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:radial-gradient(circle at 50% -10%, var(--bg-glow), var(--bg) 55%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;}
  body{padding:max(18px, env(safe-area-inset-top)) 16px calc(76px + env(safe-area-inset-bottom));}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-top:6px;}
  .date{font-size:13px;color:var(--text-soft);text-transform:capitalize;}
  .header-actions{display:flex;gap:8px;}
  .icon-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--card-border-hover);background:var(--card);color:var(--text-soft);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .icon-btn:active{transform:scale(0.94);background:#1a2338;}
  .add-btn{border:1px solid var(--card-border-hover);background:var(--card);color:var(--text);border-radius:12px;padding:9px 16px;font-size:14px;display:flex;align-items:center;gap:6px;}
  .add-btn:active{transform:scale(0.96);background:#1a2338;}
  .grid{display:flex;flex-direction:column;gap:12px;}
  .card{position:relative;background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:16px 17px;display:flex;flex-direction:column;gap:11px;overflow:hidden;transition:box-shadow .4s ease, border-color .4s ease;}
  .card.dragging{opacity:0.92;box-shadow:0 10px 28px -6px rgba(0,0,0,0.55);z-index:30;transition:none;}
  .drag-handle{cursor:grab;color:var(--text-faint);font-size:16px;padding:4px 8px 4px 0;flex-shrink:0;touch-action:none;line-height:1;letter-spacing:-1px;}
  .card.celebrate{border-color:var(--cat-color, #60A5FA);box-shadow:0 0 0 1px var(--cat-color, #60A5FA), 0 0 24px -4px var(--cat-color, #60A5FA);}
  .card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .name-row{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  .swatch{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,0.15);}
  .name-input{border:none;background:transparent;font-size:16px;font-weight:600;color:var(--text);width:100%;padding:2px 0;min-width:0;}
  .name-input:focus{outline:none;}
  .remove-btn{border:none;background:transparent;color:var(--text-faint);font-size:18px;line-height:1;padding:4px 6px;flex-shrink:0;}
  .card-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;}
  .history-btn{border:none;background:transparent;color:var(--text-faint);font-size:15px;line-height:1;padding:4px 6px;}
  .palette{display:none;gap:8px;padding:2px 0 4px;flex-wrap:wrap;}
  .palette.open{display:flex;}
  .palette-dot{width:24px;height:24px;border-radius:50%;border:2px solid transparent;}
  .palette-dot.active{border-color:var(--text);}
  .marks{min-height:24px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;position:relative;}
  .group{position:relative;display:flex;gap:3px;align-items:flex-end;width:26px;height:22px;}
  .stroke{width:3.5px;height:22px;background:var(--cat-color, #60A5FA);border-radius:2px;}
  .diag{position:absolute;left:-3px;top:9px;width:30px;height:3.5px;background:var(--text);border-radius:2px;transform:rotate(-32deg);}
  .empty-marks{font-size:13px;color:var(--text-faint);}
  .bottom-row{display:flex;align-items:center;justify-content:space-between;}
  .count{font-variant-numeric:tabular-nums;font-size:26px;font-weight:700;color:var(--text);display:inline-block;}
  .count.bump{animation:bump .32s ease;}
  @keyframes bump{0%{transform:scale(1);}40%{transform:scale(1.28);}100%{transform:scale(1);}}
  .controls{display:flex;gap:8px;align-items:center;}
  .btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--card-border-hover);background:#1a2338;color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;position:relative;}
  .btn.plus-btn{border-color:var(--cat-color, #60A5FA);color:var(--cat-color, #60A5FA);}
  .btn:active{transform:scale(0.92);}
  .reset-btn{width:36px;height:36px;border-radius:12px;border:1px solid var(--card-border-hover);background:transparent;color:var(--text-faint);font-size:16px;display:flex;align-items:center;justify-content:center;}
  .reset-btn:active{background:#1a2338;}
  .hint{text-align:center;font-size:12px;color:var(--text-faint);margin-top:22px;}
  .particle{position:absolute;width:6px;height:6px;border-radius:50%;pointer-events:none;top:50%;left:50%;}
  .streak-badge{font-size:13px;font-weight:600;color:#FBBF24;background:rgba(251,191,36,0.14);padding:3px 9px;border-radius:8px;display:inline-flex;align-items:center;gap:3px;}
  .toast{position:fixed;left:50%;top:16px;transform:translate(-50%,-24px);background:var(--card);border:1px solid var(--card-border-hover);color:var(--text);padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:opacity .32s ease, transform .32s ease;z-index:50;box-shadow:0 10px 28px -6px rgba(0,0,0,0.55);pointer-events:none;max-width:calc(100% - 32px);text-align:center;}
  .toast.show{opacity:1;transform:translate(-50%,0);}

  .tabbar{position:fixed;left:0;right:0;bottom:0;display:flex;background:var(--card);border-top:1px solid var(--card-border);padding:8px 16px calc(8px + env(safe-area-inset-bottom));gap:8px;}
  .tab-btn{flex:1;border:none;background:transparent;color:var(--text-faint);font-size:13px;padding:8px 0;border-radius:10px;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .tab-btn.active{color:var(--text);background:#1a2338;}
  .tab-icon{font-size:18px;}
  .view{display:none;}
  .view.active{display:block;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:flex-end;justify-content:center;z-index:20;}
  .overlay.open{display:flex;}
  .sheet{background:var(--card);border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;}
  .sheet h3{margin:0;font-size:16px;font-weight:600;}
  .field-label{font-size:12px;color:var(--text-soft);margin-bottom:6px;display:block;}
  .field-input{width:100%;background:#0F1524;border:1px solid var(--card-border-hover);border-radius:10px;padding:11px 12px;color:var(--text);font-size:15px;}
  .field-input:focus{outline:none;border-color:#60A5FA;}
  .sheet-actions{display:flex;gap:10px;margin-top:4px;}
  .sheet-btn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--card-border-hover);background:transparent;color:var(--text);font-size:14px;}
  .sheet-btn.primary{background:#2563EB;border-color:#2563EB;color:#fff;}
  .sheet-btn.danger{color:#F87171;border-color:#3a2431;}
  .sheet-close{align-self:center;color:var(--text-faint);font-size:13px;padding:4px;}
  .highscore-row{display:flex;align-items:baseline;gap:8px;}
  .highscore-value{font-size:30px;font-weight:700;}
  .highscore-label{font-size:12px;color:var(--text-soft);}
  .chart-wrap{margin-top:2px;}
  .stats-row{display:flex;gap:24px;margin-top:-4px;}
  .stat-value{font-size:20px;font-weight:700;}
  .stat-label{font-size:11px;color:var(--text-soft);display:block;}

  .friends-status{font-size:12px;color:var(--text-faint);margin-bottom:14px;}
  .member-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:14px 16px;margin-bottom:12px;}
  .member-name{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .you-badge{font-size:11px;color:var(--text-faint);font-weight:400;background:#1a2338;padding:2px 8px;border-radius:6px;}
  .member-cat-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-top:1px solid var(--card-border);}
  .member-cat-row:first-of-type{border-top:none;}
  .member-cat-name{font-size:13px;color:var(--text-soft);}
  .member-cat-count{font-size:14px;font-weight:600;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text-faint);}
  .empty-state .icon-big{font-size:32px;margin-bottom:10px;}
  .empty-state button{margin-top:16px;}
</style>
</head>
<body>

<div id="view-ich" class="view active">
  <header>
    <span class="date" id="dateLabel"></span>
    <div class="header-actions">
      <button class="icon-btn" id="settingsBtn" aria-label="Profil">&#9881;</button>
      <button class="add-btn" id="addBtn">+ Kategorie</button>
    </div>
  </header>
  <div class="grid" id="grid"></div>
  <div class="hint">Wird automatisch auf diesem Gerät gespeichert.</div>
</div>

<div id="view-freunde" class="view">
  <header>
    <span class="date">Freunde</span>
  </header>
  <div class="friends-status" id="friendsStatus"></div>
  <div id="friendsList"></div>
</div>

<div class="tabbar">
  <button class="tab-btn active" id="tabIchBtn"><span class="tab-icon">&#9998;</span>Ich</button>
  <button class="tab-btn" id="tabFreundeBtn"><span class="tab-icon">&#128101;</span>Freunde</button>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="sheet">
    <h3>Profil & Gruppe</h3>
    <div>
      <label class="field-label">Dein Name</label>
      <input class="field-input" id="nameInput" placeholder="z.B. Elias" maxlength="20">
    </div>
    <div>
      <label class="field-label">Sync-Code (optional) – gleicher Code auf mehreren Geräten = gleiche Liste</label>
      <input class="field-input" id="syncCodeInput" placeholder="z.B. elias-privat" maxlength="30">
    </div>
    <div>
      <label class="field-label">Gruppencode (optional) – zum Vergleichen mit Freunden</label>
      <input class="field-input" id="codeInput" placeholder="z.B. zweisam2026" maxlength="30">
    </div>
    <div class="sheet-actions">
      <button class="sheet-btn danger" id="leaveBtn">Gruppe verlassen</button>
      <button class="sheet-btn primary" id="saveProfileBtn">Speichern</button>
    </div>
    <button class="sheet-close" id="closeSettingsBtn">Schließen</button>
  </div>
</div>

<div class="overlay" id="historyOverlay">
  <div class="sheet">
    <h3 id="historyTitle">Kategorie</h3>
    <div class="highscore-row">
      <span class="highscore-value" id="historyHighscore">0</span>
      <span class="highscore-label">Highscore<span id="historyHighscoreDate"></span></span>
    </div>
    <div class="stats-row">
      <div><span class="stat-value" id="currentStreakValue">0</span><span class="stat-label">Tage aktuelle Serie</span></div>
      <div><span class="stat-value" id="bestStreakValue">0</span><span class="stat-label">Tage beste Serie</span></div>
    </div>
    <div class="chart-wrap" id="historyChartWrap"></div>
    <button class="sheet-close" id="closeHistoryBtn">Schließen</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script>
// ==== Firebase config: hier deine eigenen Werte aus der Firebase-Konsole eintragen ====
const firebaseConfig = {
  apiKey: "AIzaSyCAZ_DWGUAINJPjsKqXu1AK_XF81qiAjl0",
  authDomain: "strichliste-a742d.firebaseapp.com",
  projectId: "strichliste-a742d",
  storageBucket: "strichliste-a742d.firebasestorage.app",
  messagingSenderId: "221047265942",
  appId: "1:221047265942:web:e61ec8e5753632cd5e80b7"
};
let db = null;
try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}catch(e){
  console.warn('Firebase nicht konfiguriert', e);
}

const STORAGE_KEY = 'strichliste-categories';
const HISTORY_KEY = 'strichliste-history';
const PROFILE_KEY = 'strichliste-profile';
const MYID_KEY = 'strichliste-my-id';
const PALETTE = ['#60A5FA','#F87171','#FBBF24','#4FD1C5','#A78BFA','#F472B6','#34D399','#FB923C'];
const defaults = [
  {id:'c1', name:'Bewegung', count:0, color:PALETTE[0]},
  {id:'c2', name:'Lesen', count:0, color:PALETTE[1]},
  {id:'c3', name:'Meditation', count:0, color:PALETTE[2]},
  {id:'c4', name:'Gesund gegessen', count:0, color:PALETTE[3]},
  {id:'c5', name:'Rauchfrei', count:0, color:PALETTE[4]},
  {id:'c6', name:'Früh ins Bett', count:0, color:PALETTE[5]}
];
let categories = [];
let history = {};
let openPaletteId = null;
let profile = { name:'', code:'', syncCode:'' };
let myId = null;
let unsubscribeFriends = null;
let unsubscribePersonal = null;
const grid = document.getElementById('grid');

function uid(){ return 'c' + Math.random().toString(36).slice(2,9); }

function getMyId(){
  if(profile.syncCode) return profile.syncCode;
  let id = localStorage.getItem(MYID_KEY);
  if(!id){
    id = 'u' + Math.random().toString(36).slice(2,10);
    localStorage.setItem(MYID_KEY, id);
  }
  return id;
}

function loadProfile(){
  try{
    const raw = localStorage.getItem(PROFILE_KEY);
    profile = raw ? JSON.parse(raw) : { name:'', code:'', syncCode:'' };
    if(!('syncCode' in profile)) profile.syncCode = '';
  }catch(e){ profile = { name:'', code:'', syncCode:'' }; }
}

function saveProfile(){
  localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
}

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    categories = raw ? JSON.parse(raw) : defaults.slice();
    categories.forEach((c,i)=>{ if(!c.color) c.color = PALETTE[i % PALETTE.length]; });
  }catch(e){
    categories = defaults.slice();
  }
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('de-DE', { weekday:'long', day:'numeric', month:'long' });
  render();
}

function dateKey(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayKey(){ return dateKey(new Date()); }
function lastNDates(n){
  const arr=[];
  const now = new Date();
  for(let i=n-1;i>=0;i--){
    const d = new Date(now); d.setDate(now.getDate()-i);
    arr.push(dateKey(d));
  }
  return arr;
}
function formatShortDate(key){
  const [y,m,d] = key.split('-');
  return `${d}.${m}.`;
}

function loadHistory(){
  try{
    const raw = localStorage.getItem(HISTORY_KEY);
    history = raw ? JSON.parse(raw) : {};
  }catch(e){ history = {}; }
}
function saveHistoryLocal(){
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }catch(e){}
}
function recordHistory(cat){
  const key = todayKey();
  if(!history[cat.id]) history[cat.id] = {};
  history[cat.id][key] = Math.max(history[cat.id][key] || 0, cat.count);
  saveHistoryLocal();
}

const STREAK_MILESTONES = [2,3,5,7,10,14,21,30,50,75,100];

function isDayActive(catId, key){
  return !!(history[catId] && history[catId][key] > 0);
}

function computeStreak(catId){
  let streak = 0;
  let d = new Date();
  if(!isDayActive(catId, dateKey(d))){
    d.setDate(d.getDate()-1);
  }
  while(isDayActive(catId, dateKey(d))){
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function computeBestStreak(catId){
  const hist = history[catId] || {};
  const keys = Object.keys(hist).filter(k => hist[k] > 0).sort();
  if(keys.length === 0) return 0;
  let best = 1, current = 1;
  for(let i=1;i<keys.length;i++){
    const diffDays = Math.round((new Date(keys[i]) - new Date(keys[i-1])) / 86400000);
    current = diffDays === 1 ? current+1 : 1;
    if(current > best) best = current;
  }
  return Math.max(best, computeStreak(catId));
}

function streakBadge(catId){
  const streak = computeStreak(catId);
  if(streak < 2) return '';
  return `<span class="streak-badge">&#128293; ${streak}</span>`;
}

function showToast(text){
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = text;
  document.body.appendChild(toast);
  requestAnimationFrame(()=> toast.classList.add('show'));
  setTimeout(()=>{
    toast.classList.remove('show');
    setTimeout(()=> toast.remove(), 320);
  }, 2400);
}

function save(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(categories)); }catch(e){}
  syncToCloud();
  pushPersonalToCloud();
}

let syncTimer = null;
function syncToCloud(){
  if(!db || !profile.code) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>{
    db.collection('groups').doc(profile.code).collection('members').doc(myId).set({
      name: profile.name || 'Ohne Namen',
      categories: categories.map(c=>({name:c.name, count:c.count, color:c.color})),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(e=> console.warn('sync failed', e));
  }, 400);
}

let personalSyncTimer = null;
function pushPersonalToCloud(){
  if(!db || !profile.syncCode) return;
  clearTimeout(personalSyncTimer);
  personalSyncTimer = setTimeout(()=>{
    db.collection('users').doc(profile.syncCode).set({
      categories: categories.map(c=>({id:c.id, name:c.name, count:c.count, color:c.color})),
      history: history,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(e=> console.warn('personal sync failed', e));
  }, 400);
}

function subscribePersonal(){
  if(unsubscribePersonal){ unsubscribePersonal(); unsubscribePersonal = null; }
  if(!db || !profile.syncCode) return;
  unsubscribePersonal = db.collection('users').doc(profile.syncCode)
    .onSnapshot((snap)=>{
      if(snap.metadata.hasPendingWrites) return;
      if(snap.exists){
        const data = snap.data();
        if(Array.isArray(data.categories) && data.categories.length){
          categories = data.categories.map((c,i)=>({
            id: c.id || uid(),
            name: c.name || 'Ohne Namen',
            count: c.count || 0,
            color: c.color || PALETTE[i % PALETTE.length]
          }));
          try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(categories)); }catch(e){}
        }
        if(data.history && typeof data.history === 'object'){
          history = data.history;
          saveHistoryLocal();
        }
        render();
      } else {
        pushPersonalToCloud();
      }
    }, (err)=> console.warn('personal sync listener error', err));
}

function strokeGroup(n, color){
  let strokes = '';
  for(let i=0;i<Math.min(n,4);i++){ strokes += `<div class="stroke" style="--cat-color:${color}"></div>`; }
  if(n>=5){
    return `<div class="group">${strokes}<div class="diag"></div></div>`;
  }
  return `<div class="group" style="position:static;">${strokes}</div>`;
}

function tallyMarks(count, color){
  if(count<=0) return '<span class="empty-marks">Noch keine Striche</span>';
  const fullGroups = Math.floor(count/5);
  const remainder = count % 5;
  let html = '';
  for(let i=0;i<fullGroups;i++) html += strokeGroup(5, color);
  if(remainder>0) html += strokeGroup(remainder, color);
  return html;
}

function paletteRow(cat){
  return PALETTE.map(c=>`<button class="palette-dot ${c===cat.color?'active':''}" style="background:${c}" data-id="${cat.id}" data-color="${c}"></button>`).join('');
}

function render(){
  grid.innerHTML = '';
  categories.forEach(cat=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = cat.id;
    card.style.setProperty('--cat-color', cat.color);
    card.innerHTML = `
      <div class="card-top">
        <div class="name-row">
          <span class="drag-handle" data-id="${cat.id}">&#8942;&#8942;</span>
          <button class="swatch" style="background:${cat.color}" data-id="${cat.id}"></button>
          <input class="name-input" value="${cat.name.replace(/"/g,'&quot;')}" data-id="${cat.id}" />
        </div>
        <div class="card-actions">
          <button class="history-btn" data-id="${cat.id}" aria-label="Verlauf">&#128200;</button>
          <button class="remove-btn" data-id="${cat.id}">&times;</button>
        </div>
      </div>
      <div class="palette ${openPaletteId===cat.id?'open':''}" data-palette-for="${cat.id}">${paletteRow(cat)}</div>
      <div class="marks">${tallyMarks(cat.count, cat.color)}</div>
      <div class="bottom-row">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="count" data-count-for="${cat.id}">${cat.count}</span>
          ${streakBadge(cat.id)}
        </div>
        <div class="controls">
          <button class="btn minus-btn" data-id="${cat.id}">&minus;</button>
          <button class="btn plus-btn" data-id="${cat.id}" style="--cat-color:${cat.color}">+</button>
          <button class="reset-btn" data-id="${cat.id}" title="Zurücksetzen">&#8635;</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
  attach();
}

function attach(){
  grid.querySelectorAll('.plus-btn').forEach(b=> b.onclick = (e)=> change(b.dataset.id, 1, e));
  grid.querySelectorAll('.minus-btn').forEach(b=> b.onclick = ()=> change(b.dataset.id, -1));
  grid.querySelectorAll('.reset-btn').forEach(b=> b.onclick = ()=> setCount(b.dataset.id, 0));
  grid.querySelectorAll('.remove-btn').forEach(b=> b.onclick = ()=> removeCat(b.dataset.id));
  grid.querySelectorAll('.name-input').forEach(inp=> inp.onchange = ()=> renameCat(inp.dataset.id, inp.value));
  grid.querySelectorAll('.swatch').forEach(b=> b.onclick = ()=> togglePalette(b.dataset.id));
  grid.querySelectorAll('.palette-dot').forEach(b=> b.onclick = ()=> setColor(b.dataset.id, b.dataset.color));
  grid.querySelectorAll('.history-btn').forEach(b=> b.onclick = ()=> openHistory(b.dataset.id));
  grid.querySelectorAll('.drag-handle').forEach(h=> h.addEventListener('pointerdown', onDragStart));
}

function onDragStart(e){
  e.preventDefault();
  const handle = e.currentTarget;
  const card = handle.closest('.card');
  if(!card) return;
  const pointerId = e.pointerId;
  const cardRect = card.getBoundingClientRect();
  const gridRect = grid.getBoundingClientRect();
  const pointerOffsetInCard = e.clientY - cardRect.top;
  const cardHeight = cardRect.height;
  card.classList.add('dragging');
  handle.setPointerCapture(pointerId);

  function onMove(ev){
    const desiredTop = ev.clientY - pointerOffsetInCard;
    const naturalTop = gridRect.top + card.offsetTop;
    const translateY = desiredTop - naturalTop;
    card.style.transform = `translateY(${translateY}px)`;
    const currentCenter = desiredTop + cardHeight/2;

    const siblings = Array.from(grid.children).filter(c=>c!==card);
    for(const sib of siblings){
      const sNaturalTop = gridRect.top + sib.offsetTop;
      const sCenter = sNaturalTop + sib.offsetHeight/2;
      const sibIsAfter = !!(card.compareDocumentPosition(sib) & Node.DOCUMENT_POSITION_FOLLOWING);
      if(sibIsAfter && currentCenter > sCenter){
        grid.insertBefore(card, sib.nextSibling);
        break;
      } else if(!sibIsAfter && currentCenter < sCenter){
        grid.insertBefore(card, sib);
        break;
      }
    }
  }

  function onUp(ev){
    try{ handle.releasePointerCapture(pointerId); }catch(err){}
    handle.removeEventListener('pointermove', onMove);
    handle.removeEventListener('pointerup', onUp);
    handle.removeEventListener('pointercancel', onUp);
    card.classList.remove('dragging');
    card.style.transform = '';
    const newOrder = Array.from(grid.querySelectorAll('.card')).map(c=>c.dataset.id);
    categories = newOrder.map(id=> categories.find(c=>c.id===id)).filter(Boolean);
    save();
  }

  handle.addEventListener('pointermove', onMove);
  handle.addEventListener('pointerup', onUp);
  handle.addEventListener('pointercancel', onUp);
}

const historyOverlay = document.getElementById('historyOverlay');
document.getElementById('closeHistoryBtn').onclick = ()=> historyOverlay.classList.remove('open');

function renderChartSVG(days, values, color){
  const w = 300, h = 130, padBottom = 18, padTop = 10;
  const max = Math.max(1, ...values);
  const barSlot = w / days.length;
  const barW = barSlot * 0.55;
  const bars = values.map((v,i)=>{
    const barH = (v/max) * (h - padBottom - padTop);
    const x = i*barSlot + (barSlot-barW)/2;
    const y = h - padBottom - barH;
    const isToday = i === days.length-1;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(barH,2).toFixed(1)}" rx="3" fill="${color}" opacity="${isToday?1:0.5}"></rect>`;
  }).join('');
  const firstLabel = formatShortDate(days[0]);
  const lastLabel = formatShortDate(days[days.length-1]);
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:130px;display:block;">
    ${bars}
    <text x="0" y="${h-3}" font-size="9" style="fill:var(--text-faint)">${firstLabel}</text>
    <text x="${w}" y="${h-3}" font-size="9" text-anchor="end" style="fill:var(--text-faint)">${lastLabel}</text>
  </svg>`;
}

function openHistory(id){
  const cat = categories.find(c=>c.id===id);
  if(!cat) return;
  const hist = history[cat.id] || {};
  const days = lastNDates(14);
  const values = days.map(d => hist[d] || 0);
  values[values.length-1] = Math.max(values[values.length-1], cat.count);
  const allValues = Object.values(hist).concat([cat.count]);
  const highscore = Math.max(0, ...allValues);
  let highDate = Object.keys(hist).find(k => hist[k] === highscore && highscore > 0);

  document.getElementById('historyTitle').textContent = cat.name;
  const hsEl = document.getElementById('historyHighscore');
  hsEl.textContent = highscore;
  hsEl.style.color = cat.color;
  document.getElementById('historyHighscoreDate').textContent = highDate ? ' · ' + formatShortDate(highDate) : (highscore>0 ? ' · heute' : '');
  document.getElementById('currentStreakValue').textContent = computeStreak(cat.id);
  document.getElementById('bestStreakValue').textContent = computeBestStreak(cat.id);
  document.getElementById('historyChartWrap').innerHTML = renderChartSVG(days, values, cat.color);
  historyOverlay.classList.add('open');
}

function vibrate(pattern){
  if(navigator.vibrate){ try{ navigator.vibrate(pattern); }catch(e){} }
}

function burst(originEl, color){
  const rect = originEl.getBoundingClientRect();
  const count = 8;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.background = color;
    p.style.left = (rect.left + rect.width/2) + 'px';
    p.style.top = (rect.top + rect.height/2) + 'px';
    p.style.position = 'fixed';
    document.body.appendChild(p);
    const angle = (Math.PI * 2 * i) / count + Math.random()*0.4;
    const dist = 30 + Math.random()*24;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    p.animate([
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform: `translate(${dx-rect.width/2}px, ${dy-rect.height/2}px) scale(0.3)`, opacity: 0 }
    ], { duration: 480, easing: 'cubic-bezier(.2,.8,.2,1)' }).onfinish = ()=> p.remove();
  }
}

function change(id, delta, evt){
  const cat = categories.find(c=>c.id===id);
  if(!cat) return;
  const before = cat.count;
  const wasActiveToday = isDayActive(cat.id, todayKey());
  cat.count = Math.max(0, cat.count + delta);
  recordHistory(cat);
  save();
  render();
  if(delta>0 && cat.count>before){
    vibrate(12);
    const countEl = grid.querySelector(`[data-count-for="${id}"]`);
    if(countEl){ countEl.classList.add('bump'); setTimeout(()=>countEl.classList.remove('bump'), 340); }
    if(evt && evt.currentTarget){ burst(evt.currentTarget, cat.color); }
    if(cat.count % 5 === 0){
      vibrate([15,40,25]);
      const cardEl = grid.querySelectorAll('.card')[categories.indexOf(cat)];
      if(cardEl){
        cardEl.classList.add('celebrate');
        setTimeout(()=> cardEl.classList.remove('celebrate'), 900);
      }
    }
    if(!wasActiveToday){
      const streak = computeStreak(cat.id);
      if(STREAK_MILESTONES.includes(streak)){
        vibrate([20,60,20,60,30]);
        showToast(`\u{1F525} ${cat.name}: ${streak} Tage Serie!`);
        const cardEl = grid.querySelectorAll('.card')[categories.indexOf(cat)];
        if(cardEl){
          cardEl.classList.add('celebrate');
          setTimeout(()=> cardEl.classList.remove('celebrate'), 1300);
        }
      }
    }
  }
}
function setCount(id, value){
  const cat = categories.find(c=>c.id===id);
  if(!cat) return;
  recordHistory(cat);
  cat.count = value;
  save(); render();
}
function renameCat(id, name){
  const cat = categories.find(c=>c.id===id);
  if(!cat) return;
  cat.name = name.trim() || 'Ohne Namen';
  save();
}
function removeCat(id){
  if(categories.length<=1) return;
  categories = categories.filter(c=>c.id!==id);
  if(openPaletteId===id) openPaletteId = null;
  save(); render();
}
function togglePalette(id){
  openPaletteId = openPaletteId===id ? null : id;
  render();
}
function setColor(id, color){
  const cat = categories.find(c=>c.id===id);
  if(!cat) return;
  cat.color = color;
  openPaletteId = null;
  save(); render();
}
document.getElementById('addBtn').onclick = ()=>{
  if(categories.length>=8) return;
  const nextColor = PALETTE[categories.length % PALETTE.length];
  categories.push({id:uid(), name:'Neue Kategorie', count:0, color:nextColor});
  save(); render();
};

// ==== Friends view ====
const friendsStatus = document.getElementById('friendsStatus');
const friendsList = document.getElementById('friendsList');
let latestMembers = [];

function subscribeFriends(){
  if(unsubscribeFriends){ unsubscribeFriends(); unsubscribeFriends = null; }
  latestMembers = [];
  if(!db || !profile.code){
    renderFriendsView();
    return;
  }
  unsubscribeFriends = db.collection('groups').doc(profile.code).collection('members')
    .onSnapshot((snap)=>{
      latestMembers = [];
      snap.forEach(doc=> latestMembers.push({ id: doc.id, ...doc.data() }));
      renderFriendsView();
    }, (err)=>{
      console.warn('friends listener error', err);
      renderFriendsView(err);
    });
}

function renderFriendsView(error){
  if(!db){
    friendsStatus.textContent = '';
    friendsList.innerHTML = `<div class="empty-state"><div class="icon-big">&#9881;</div>Cloud-Sync ist noch nicht eingerichtet.</div>`;
    return;
  }
  if(!profile.code){
    friendsStatus.textContent = '';
    friendsList.innerHTML = `<div class="empty-state"><div class="icon-big">&#128101;</div>Noch keiner Gruppe beigetreten.<br><button class="sheet-btn primary" id="joinFromEmptyBtn" style="margin-top:14px;">Gruppencode eingeben</button></div>`;
    const btn = document.getElementById('joinFromEmptyBtn');
    if(btn) btn.onclick = ()=> document.getElementById('settingsBtn').click();
    return;
  }
  if(error){
    friendsStatus.textContent = '';
    friendsList.innerHTML = `<div class="empty-state">Verbindung fehlgeschlagen. Prüfe die Firebase-Konfiguration.</div>`;
    return;
  }
  friendsStatus.textContent = `Gruppe "${profile.code}" · ${latestMembers.length} Mitglied${latestMembers.length===1?'':'er'}`;
  if(latestMembers.length===0){
    friendsList.innerHTML = `<div class="empty-state">Noch niemand hier. Teile den Code "${profile.code}" mit deinen Freunden.</div>`;
    return;
  }
  const sorted = latestMembers.slice().sort((a,b)=> a.id===myId ? -1 : b.id===myId ? 1 : (a.name||'').localeCompare(b.name||''));
  friendsList.innerHTML = sorted.map(m=>{
    const cats = (m.categories || []);
    const rows = cats.length ? cats.map(c=>`
      <div class="member-cat-row">
        <span class="member-cat-name">${(c.name||'').replace(/</g,'&lt;')}</span>
        <span class="member-cat-count" style="color:${c.color||'#60A5FA'}">${c.count||0}</span>
      </div>
    `).join('') : `<div class="member-cat-row"><span class="member-cat-name">Noch keine Kategorien</span></div>`;
    return `
      <div class="member-card">
        <div class="member-name">${(m.name||'Ohne Namen').replace(/</g,'&lt;')} ${m.id===myId ? '<span class="you-badge">Du</span>' : ''}</div>
        ${rows}
      </div>
    `;
  }).join('');
}

loadHistory();
load();
subscribeFriends();
subscribePersonal();

  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
